name: Build and deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Hakyll site
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
      HAS_CLOUDFLARE_WORKERS_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN != '' }}
      HAS_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
      CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || secrets.CLOUDFLARE_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          enable-stack: true
          stack-version: "3.7.1"

      - name: Cache Stack
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml', 'personal-site.cabal') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Build site executable
        run: stack build

      - name: Generate static site
        run: stack exec site rebuild

      - name: Check generated pages
        run: |
          test -f _site/index.html
          test -f _site/projects/index.html
          test -f _site/demo/index.html
          test -f _site/writing/index.html
          test -f _site/contact/index.html
          test -f _site/404.html
          node --check cloudflare/demo-router-worker.js

      - name: Skip Cloudflare deploy until secrets are configured
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (env.HAS_CLOUDFLARE_API_TOKEN != 'true' || env.HAS_CLOUDFLARE_ACCOUNT_ID != 'true' || env.CLOUDFLARE_PROJECT_NAME == '')
        run: echo "Cloudflare Pages deploy config is incomplete; set CLOUDFLARE_PROJECT_NAME to the real Pages project name."

      - name: List visible Cloudflare Pages projects
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CLOUDFLARE_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project list
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CLOUDFLARE_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true' && env.CLOUDFLARE_PROJECT_NAME != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=main --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy demo Worker to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CLOUDFLARE_WORKERS_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config cloudflare/wrangler.worker.toml
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip demo Worker deploy until Worker token is configured
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (env.HAS_CLOUDFLARE_WORKERS_API_TOKEN != 'true' || env.HAS_CLOUDFLARE_ACCOUNT_ID != 'true')
        run: echo "CLOUDFLARE_WORKERS_API_TOKEN is not configured; skipping demo Worker deployment."
