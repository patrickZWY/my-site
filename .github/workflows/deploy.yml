name: Build and deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Hakyll site
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_WORKERS_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN != '' }}
      HAS_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          enable-stack: true
          stack-version: "3.7.1"

      - name: Cache Stack
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml', 'personal-site.cabal') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Build site executable
        run: stack build

      - name: Generate static site
        run: stack exec site rebuild

      - name: Check generated pages
        run: |
          test -f _site/index.html
          test -f _site/projects/index.html
          test -f _site/demo/index.html
          test -f _site/writing/index.html
          test -f _site/contact/index.html
          test -f _site/404.html
          test -f _site/study-nav.js
          test ! -e _site/rabbithole/index.html
          test -f _site/private-study-assets-v1-621b0c418a9e8c8add0633a3491d19be419716893c1fa7a844a28bf51369ca71/rabbithole.html
          node --check static/study-nav.js
          node --check cloudflare/site-worker.js
          node --check cloudflare/demo-router-worker.js

      - name: Deploy personal site Worker to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CLOUDFLARE_WORKERS_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config cloudflare/wrangler.site.toml
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip personal site deploy until Worker token is configured
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (env.HAS_CLOUDFLARE_WORKERS_API_TOKEN != 'true' || env.HAS_CLOUDFLARE_ACCOUNT_ID != 'true')
        run: echo "CLOUDFLARE_WORKERS_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is missing; skipping personal site Worker deployment."

      - name: Deploy demo Worker to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CLOUDFLARE_WORKERS_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config cloudflare/wrangler.worker.toml
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip demo Worker deploy until Worker token is configured
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (env.HAS_CLOUDFLARE_WORKERS_API_TOKEN != 'true' || env.HAS_CLOUDFLARE_ACCOUNT_ID != 'true')
        run: echo "CLOUDFLARE_WORKERS_API_TOKEN is not configured; skipping demo Worker deployment."
