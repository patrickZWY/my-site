name: Deploy demo Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy demo Worker
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_WORKERS_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN != '' }}
      HAS_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Worker syntax
        run: node --check cloudflare/demo-router-worker.js

      - name: Deploy demo Worker to Cloudflare
        if: env.HAS_CLOUDFLARE_WORKERS_API_TOKEN == 'true' && env.HAS_CLOUDFLARE_ACCOUNT_ID == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config cloudflare/wrangler.worker.toml
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip until Cloudflare secrets are configured
        if: env.HAS_CLOUDFLARE_WORKERS_API_TOKEN != 'true' || env.HAS_CLOUDFLARE_ACCOUNT_ID != 'true'
        run: echo "CLOUDFLARE_WORKERS_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is missing; skipping Worker deployment."
