<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$if(title)$$title$ | $endif$$siteTitle$</title>
  <meta name="description" content="$if(description)$$description$$else$Personal website for Zheng Wangyuan (Patrick).$endif$">
  <meta name="color-scheme" content="dark">
  <meta property="og:site_name" content="$siteTitle$">
  <meta property="og:title" content="$if(title)$$title$$else$$siteTitle$$endif$">
  <meta property="og:description" content="$if(description)$$description$$else$Personal website for Zheng Wangyuan (Patrick).$endif$">
  <meta property="og:type" content="website">
  <meta property="og:url" content="$siteUrl$$canonicalPath$">
  <meta property="og:image" content="$siteUrl$/og-image.svg">
  <link rel="canonical" href="$siteUrl$$canonicalPath$">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body class="$if(bodyClass)$$bodyClass$$endif$">
  <a class="skip-link" href="#content">Skip to content</a>
  <header class="site-header">
    <div class="site-shell header-inner">
      <a class="brand" href="/" aria-label="$siteTitle$ home">
        <span class="brand-text">Zheng Wangyuan</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/projects/"$if(navProjects)$ aria-current="page"$endif$>Projects</a>
        <a href="/writing/"$if(navWriting)$ aria-current="page"$endif$>Writing</a>
        <a href="/#about">About</a>
        <a href="/contact/"$if(navContact)$ aria-current="page"$endif$>Contact</a>
      </nav>
    </div>
  </header>

  <main id="content" class="site-main site-shell">
    $body$
  </main>

  <footer class="site-footer">
    <div class="site-shell footer-inner">
      <span>&copy; 2026 Zheng Wangyuan</span>
      <a href="/fun/">Experiments</a>
    </div>
  </footer>
  $if(poemPage)$<script src="/poem.js"></script>$endif$
</body>
</html>
